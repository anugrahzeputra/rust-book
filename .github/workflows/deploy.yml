name: Deploy to GitHub Pages

on:
  push:
    branches:
      - indonesian-translation # Deploy when pushing to this branch

permissions:
  contents: read
  pages: write
  id-token: write

env:
  MDBOOK_VERSION: 0.5.1

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.90

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install mdBook
        run: |
          mkdir bin
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz | tar -xz --directory=bin
          echo "$(pwd)/bin" >> "${GITHUB_PATH}"

      - name: Build custom mdBook plugins
        run: |
          cargo build --release --manifest-path packages/mdbook-trpl/Cargo.toml

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build Book
        run: |
          # The book.toml uses 'cargo run' for preprocessors, so they will be built/run automatically.
          # We run build once to generate the HTML in the 'book/' directory.
          mdbook build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './book'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
